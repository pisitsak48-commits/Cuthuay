version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: cuthuay_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cuthuay}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cuthuay_secret}
      POSTGRES_DB: ${POSTGRES_DB:-cuthuay}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-cuthuay}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cuthuay_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cuthuay_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-cuthuay}:${POSTGRES_PASSWORD:-cuthuay_secret}@postgres:5432/${POSTGRES_DB:-cuthuay}
      JWT_SECRET: ${JWT_SECRET:-supersecretkey_change_in_production}
      PORT: 4000
      CORS_ORIGIN: http://localhost:3000
    ports:
      - '4000:4000'
    volumes:
      - ./backend/reports:/app/reports

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cuthuay_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api
      NEXT_PUBLIC_WS_URL: ws://localhost:4000
    ports:
      - '3000:3000'

volumes:
  postgres_data:
  redis_data:
